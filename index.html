<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광주솔로몬로파크 - 가족 탐정단 범인 검거!</title>
    <style>
        /* 디자인: 탐정 느낌의 갈색과 금색 테마 */
        body { font-family: 'Arial', sans-serif; background-color: #2c1e14; color: #f4e4bc; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #3d2b1f; border: 5px solid #d4af37; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; color: #d4af37; margin-bottom: 20px; }
        .main-img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        
        /* 용의자 리스트 배치 */
        .suspect-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .suspect-card { background: #4e3829; border: 2px solid #8e6d45; border-radius: 10px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .suspect-card:hover { background: #5c4332; border-color: #d4af37; }
        .suspect-card img { width: 100%; border-radius: 5px; }
        .suspect-name { margin-top: 10px; font-weight: bold; font-size: 0.9rem; }

        /* 결과 화면 (처음엔 숨김) */
        #result-screen { display: none; margin-top: 20px; }
        /* 영상 크기 맞춤 설정 */
        .key-video { width: 100%; max-width: 300px; border-radius: 10px; border: 3px solid #d4af37; margin-bottom: 15px; }
        button { background: #d4af37; color: #2c1e14; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="game-screen">
        <img src="solomon.png" alt="솔로몬 탐정" class="main-img">
        <h1>"모든 단서를 찾았으면<br>범인을 지목해 주세요!"</h1>
        
        <div class="suspect-list">
            <div class="suspect-card" onclick="checkAnswer(1)">
                <img src="thief1.png" alt="용의자 1">
                <div class="suspect-name">용의자 1</div>
            </div>
            <div class="suspect-card" onclick="checkAnswer(2)">
                <img src="thief2.png" alt="용의자 2">
                <div class="suspect-name">용의자 2</div>
            </div>
            <div class="suspect-card" onclick="checkAnswer(3)">
                <img src="thief3.png" alt="용의자 3">
                <div class="suspect-name">용의자 3</div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <h1 id="result-text"></h1>
        
        <div id="success-content" style="display:none;">
            <video src="gold_key.mp4" class="key-video" autoplay loop muted playsinline></video>
            <p style="font-size: 1.1rem; line-height: 1.5;">
                축하합니다! 범인을 검거하고<br><strong>황금열쇠</strong>를 찾았습니다!<br><br>
                지금 이 화면을 강당 안내데스크에 보여주고<br>기념품을 받으세요!
            </p>
        </div>
        
        <button onclick="resetGame()">다시 시도하기</button>
    </div>
</div>

<script>
    function checkAnswer(num) {
        // 화면 전환 변수 설정
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const resultText = document.getElementById('result-text');
        const successContent = document.getElementById('success-content');

        // 게임 화면 숨기고 결과 화면 보여주기
        gameScreen.style.display = 'none';
        resultScreen.style.display = 'block';

        // 정답 확인 로직 (2번이 정답)
        if(num === 2) { 
            resultText.innerText = "범인 검거 완료!";
            resultText.style.color = "#d4af37";
            successContent.style.display = 'block';
        } else {
            resultText.innerText = "아쉽네요! 범인이 아닙니다.";
            resultText.style.color = "#ff4d4d";
            successContent.style.display = 'none';
        }
    }

    function resetGame() {
        // 다시 초기 화면으로 돌리기
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
    }
</script>

</body>
</html>
