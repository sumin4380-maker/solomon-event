<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광주솔로몬로파크 - 가족 탐정단 범인 검거!</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #2c1e14; color: #f4e4bc; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #3d2b1f; border: 5px solid #d4af37; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; color: #d4af37; margin-bottom: 20px; line-height: 1.4; }
        .main-img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        
        .suspect-list { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .suspect-card { background: #4e3829; border: 2px solid #8e6d45; border-radius: 10px; padding: 10px; cursor: pointer; transition: 0.3s; }
        .suspect-card:hover { background: #5c4332; border-color: #d4af37; }
        .suspect-card img { width: 100%; border-radius: 5px; }
        .suspect-name { margin-top: 10px; font-weight: bold; font-size: 0.9rem; }

        #result-screen { display: none; }
        .fullscreen-video { width: 100%; max-width: 400px; border-radius: 10px; border: 3px solid #d4af37; margin-bottom: 15px; }
        
        .highlight-box { background: rgba(212, 175, 55, 0.2); border: 2px dashed #d4af37; border-radius: 10px; padding: 15px; margin-top: 15px; }
        
        button { background: #d4af37; color: #2c1e14; border: none; padding: 12px 24px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="game-screen">
        <img src="solomon.png" alt="솔로몬 탐정" class="main-img">
        <h1>"모든 단서를 찾았으면<br>범인을 지목해 주세요!"</h1>
        
        <div class="suspect-list">
            <div class="suspect-card" onclick="checkAnswer(1)"><img src="thief1.png"><div class="suspect-name">용의자 1</div></div>
            <div class="suspect-card" onclick="checkAnswer(2)"><img src="thief2.png"><div class="suspect-name">용의자 2</div></div>
            <div class="suspect-card" onclick="checkAnswer(3)"><img src="thief3.png"><div class="suspect-name">용의자 3</div></div>
        </div>
    </div>

    <div id="result-screen">
        <h1 id="result-title"></h1>
        
        <div id="success-content" style="display:none;">
            <video id="reward-video" src="gold_key.mp4" class="fullscreen-video" playsinline controls></video>
            
            <p style="font-size: 1.2rem; line-height: 1.6; margin-bottom: 10px;">
                축하합니다! 범인을 검거하고<br><strong>황금열쇠</strong>를 찾았습니다!
            </p>

            <div class="highlight-box">
                <p style="font-size: 1.1rem; line-height: 1.5; font-weight: bold; margin: 0; color: #ffdf73;">
                    🎁 지금 이 화면을 안내요원에게 보여주고<br>
                    가족 탐정단 기념품을 받아가세요! 🎁
                </p>
            </div>
        </div>
        
        <button onclick="resetGame()">다시 시도하기</button>
    </div>
</div>

<script>
    function checkAnswer(num) {
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const resultTitle = document.getElementById('result-title');
        const successContent = document.getElementById('success-content');
        const video = document.getElementById('reward-video');

        // 메인 화면 숨기고 결과 화면 켜기
        gameScreen.style.display = 'none';
        resultScreen.style.display = 'block';

        if(num === 2) { 
            // 정답을 맞췄을 때
            resultTitle.innerText = "임무 완수!";
            resultTitle.style.color = "#d4af37";
            successContent.style.display = 'block'; // 영상과 문구 보이기
            
            // 영상 재생 및 소리 켜기
            video.muted = false; 
            video.currentTime = 0; 
            video.play();
        } else {
            // 틀렸을 때
            resultTitle.innerText = "아쉽네요! 범인이 아닙니다.";
            resultTitle.style.color = "#ff4d4d";
            successContent.style.display = 'none'; // 영상과 문구 숨기기
            video.pause();
        }
    }

    function resetGame() {
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        
        const video = document.getElementById('reward-video');
        video.pause();
    }
</script>

</body>
</html>
